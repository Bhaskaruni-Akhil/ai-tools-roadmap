name: Update Roadmap Data

on:
  workflow_dispatch:
    inputs:
      data:
        description: 'JSON data to save'
        required: true
        type: string

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.DATA_WRITE_TOKEN }}

      - name: Write data.json
        run: |
          echo '${{ github.event.inputs.data }}' > public/data.json

      - name: Commit and push
        run: |
          git config user.name "AI Roadmap Bot"
          git config user.email "bot@roadmap.ai"
          git add public/data.json
          git diff --staged --quiet || git commit -m "Update roadmap data"
          git push