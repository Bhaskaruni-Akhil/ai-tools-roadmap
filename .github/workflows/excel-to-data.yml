name: Excel to data.json

on:
  push:
    branches: [main]
    paths:
      - 'data/roadmap.xlsx'

jobs:
  convert-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install openpyxl
        run: pip install openpyxl

      - name: Convert Excel to data.json
        run: python scripts/excel_to_json.py

      - name: Commit updated data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data.json
          if git diff --staged --quiet; then
            echo "No changes to data.json — skipping commit"
          else
            git commit -m "chore: update data.json from roadmap.xlsx [skip ci]"
            git push
          fi
